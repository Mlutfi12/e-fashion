<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Fashion Store</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; min-height: 100vh; }
    header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; }
    .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 28px; font-weight: bold; }
    .cart-icon { position: relative; cursor: pointer; padding: 10px; }
    .cart-count { position: absolute; top: 0; right: 0; background: #ff6b6b; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
    .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    .product-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); transition: transform 0.3s, box-shadow 0.3s; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    .product-image { font-size: 80px; text-align: center; padding: 30px; background: #f8f9fa; }
    .product-info { padding: 20px; }
    .product-category { font-size: 12px; color: #667eea; text-transform: uppercase; font-weight: 600; margin-bottom: 5px; }
    .product-name { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 8px; }
    .product-desc { font-size: 14px; color: #666; margin-bottom: 15px; line-height: 1.5; }
    .product-footer { display: flex; justify-content: space-between; align-items: center; }
    .product-price { font-size: 22px; font-weight: bold; color: #667eea; }
    .add-btn { padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 25px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
    .add-btn:hover { transform: scale(1.05); }
    .add-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    /* Cart Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal.active { display: flex; justify-content: flex-end; }
    .cart-panel { background: white; width: 100%; max-width: 400px; height: 100%; padding: 25px; display: flex; flex-direction: column; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #e0e0e0; }
    .cart-header h2 { font-size: 24px; color: #333; }
    .close-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: #666; }
    .cart-items { flex: 1; overflow-y: auto; }
    .cart-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #f0f0f0; }
    .cart-item-image { font-size: 40px; margin-right: 15px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; color: #333; margin-bottom: 5px; }
    .cart-item-price { color: #667eea; font-weight: 600; }
    .cart-item-qty { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
    .qty-btn { width: 28px; height: 28px; border: 1px solid #e0e0e0; background: white; border-radius: 5px; cursor: pointer; font-size: 16px; }
    .remove-btn { color: #ff6b6b; background: none; border: none; cursor: pointer; font-size: 20px; }
    .cart-footer { padding-top: 20px; border-top: 2px solid #e0e0e0; }
    .cart-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; margin-bottom: 20px; }
    .checkout-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 600; cursor: pointer; }
    .empty-cart { text-align: center; padding: 40px; color: #999; }
    .notification { position: fixed; bottom: 20px; right: 20px; background: #4caf50; color: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); transform: translateY(100px); opacity: 0; transition: transform 0.3s, opacity 0.3s; }
    .notification.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">🛍️ E-Fashion</div>
      <div class="cart-icon" onclick="toggleCart()">
        🛒 <span class="cart-count" id="cartCount">0</span>
      </div>
    </div>
  </header>

  <div class="container">
    <h1 style="margin-bottom: 30px; color: #333;">New Arrivals</h1>
    <div class="products-grid" id="productsGrid"></div>
  </div>

  <!-- Cart Modal -->
  <div class="modal" id="cartModal">
    <div class="cart-panel">
      <div class="cart-header">
        <h2>Shopping Cart</h2>
        <button class="close-btn" onclick="toggleCart()">&times;</button>
      </div>
      <div class="cart-items" id="cartItems">
        <div class="empty-cart">Your cart is empty</div>
      </div>
      <div class="cart-footer">
        <div class="cart-total">
          <span>Total:</span>
          <span id="cartTotal">$0.00</span>
        </div>
        <button class="checkout-btn" onclick="checkout()">Checkout</button>
      </div>
    </div>
  </div>

  <div class="notification" id="notification">Item added to cart!</div>

  <script>
    let cart = [];

    async function loadProducts() {
      try {
        const res = await fetch('/api/products');
        const data = await res.json();
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = data.data.map(p => `
          <div class="product-card">
            <div class="product-image">${p.image}</div>
            <div class="product-info">
              <div class="product-category">${p.category}</div>
              <div class="product-name">${p.name}</div>
              <div class="product-desc">${p.description}</div>
              <div class="product-footer">
                <span class="product-price">$${p.price.toFixed(2)}</span>
                <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('productsGrid').innerHTML = '<div class="empty-cart">Error loading products</div>';
      }
    }

    async function loadCart() {
      try {
        const res = await fetch('/api/cart');
        const data = await res.json();
        cart = data.data;
        updateCartUI();
      } catch (e) { console.error('Error loading cart'); }
    }

    async function addToCart(productId) {
      try {
        const res = await fetch('/api/cart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId, quantity: 1 })
        });
        const data = await res.json();
        if (data.success) {
          cart = data.data;
          updateCartUI();
          showNotification();
        }
      } catch (e) { console.error('Error adding to cart'); }
    }

    async function updateQuantity(productId, delta) {
      const item = cart.find(i => i.productId === productId);
      if (!item) return;
      
      if (item.quantity + delta <= 0) {
        await removeFromCart(productId);
        return;
      }
      
      try {
        await fetch('/api/cart', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productId, quantity: delta })
        });
        loadCart();
      } catch (e) { console.error('Error updating quantity'); }
    }

    async function removeFromCart(productId) {
      try {
        await fetch(`/api/cart/${productId}`, { method: 'DELETE' });
        loadCart();
      } catch (e) { console.error('Error removing from cart'); }
    }

    function updateCartUI() {
      const count = document.getElementById('cartCount');
      const items = document.getElementById('cartItems');
      const total = document.getElementById('cartTotal');
      
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      
      count.textContent = totalItems;
      total.textContent = '$' + totalPrice.toFixed(2);
      
      if (cart.length === 0) {
        items.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
      } else {
        items.innerHTML = cart.map(item => `
          <div class="cart-item">
            <div class="cart-item-image">${item.image}</div>
            <div class="cart-item-info">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">$${item.price.toFixed(2)}</div>
              <div class="cart-item-qty">
                <button class="qty-btn" onclick="updateQuantity(${item.productId}, -1)">-</button>
                <span>${item.quantity}</span>
                <button class="qty-btn" onclick="updateQuantity(${item.productId}, 1)">+</button>
              </div>
            </div>
            <button class="remove-btn" onclick="removeFromCart(${item.productId})">🗑️</button>
          </div>
        `).join('');
      }
    }

    function toggleCart() {
      document.getElementById('cartModal').classList.toggle('active');
      if (document.getElementById('cartModal').classList.contains('active')) {
        loadCart();
      }
    }

    function showNotification() {
      const notif = document.getElementById('notification');
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 2000);
    }

    function checkout() {
      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }
      alert('Thank you for your order! (Demo)');
      fetch('/api/cart/clear', { method: 'POST' });
      cart = [];
      updateCartUI();
      toggleCart();
    }

    // Close modal on outside click
    document.getElementById('cartModal').addEventListener('click', function(e) {
      if (e.target === this) toggleCart();
    });

    loadProducts();
    loadCart();
  </script>
</body>
</html>
